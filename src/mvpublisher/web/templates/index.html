<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>草稿列表</title>
  </head>
  <body>
    <h1>草稿列表</h1>
    <p>本地多平台发布工作台</p>
    <ul>
      {% for draft in drafts %}
      <li>
        <a href="/drafts/{{ draft.draft_id }}">{{ draft.draft_id }}</a>
        <span>{{ draft.summary or "" }}</span>
        <span>审批：{{ draft.approval_status.value }}</span>
        <span>执行模式：{{ draft.execution_mode.value }}</span>
      </li>
      {% else %}
      <li>暂无草稿</li>
      {% endfor %}
    </ul>
  </body>
</html>
