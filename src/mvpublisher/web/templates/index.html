<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Drafts</title>
  </head>
  <body>
    <h1>Drafts</h1>
    <p>本地多平台发布工作台</p>
    <ul>
      {% for draft in drafts %}
      <li>
        <a href="/drafts/{{ draft.draft_id }}">{{ draft.draft_id }}</a>
        {% if draft.summary %}
        <span>{{ draft.summary }}</span>
        {% endif %}
      </li>
      {% else %}
      <li>暂无草稿</li>
      {% endfor %}
    </ul>
  </body>
</html>
